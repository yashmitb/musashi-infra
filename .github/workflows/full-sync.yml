name: Crawl Advance

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crawl-advance
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run job:crawl-advance
        env:
          KALSHI_BASE_URL: ${{ secrets.KALSHI_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_SYNC_PAGE_BUDGET: '5'
          FULL_SYNC_ABSOLUTE_MAX_PAGES: '1000'
          CRAWL_ADVANCE_MAX_RUNS: '3'
          CRAWL_ADVANCE_MAX_DURATION_MS: '480000'

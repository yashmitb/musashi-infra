name: Resolution Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: resolution-check
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run preflight:env -- SUPABASE_URL SUPABASE_SERVICE_KEY
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - run: npm run job:resolution-check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KALSHI_BASE_URL: ${{ secrets.KALSHI_BASE_URL }}
          RESOLUTION_CHECK_MAX_MARKETS: '200'
          RESOLUTION_CHECK_FETCH_CONCURRENCY: '2'
          RESOLUTION_CHECK_WORKER_RATE_LIMIT_MS: '250'
